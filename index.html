<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Motor de IA | Transmissão de Variável</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; }
        #chat { height: 300px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #30363d; padding: 5px; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; }
        button { background: #238636; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .ia-res { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🚀 IA Engine - Projeto Alternativo</h1>
    <div class="container">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Digite sua mensagem...">
            <button onclick="enviar()">Enviar para Variável</button>
        </div>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('pergunta');
            const chat = document.getElementById('chat');
            const msg = input.value;

            if (!msg) return;

            chat.innerHTML += `<div><b>Você:</b> ${msg}</div>`;
            input.value = "";

            try {
                // AQUI: Ele busca a variável no script que estiver rodando NA MESMA PASTA
                const response = await fetch('/perguntar', { 
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({pergunta: msg})
                });
                const data = await response.json();
                
                // Exibe o que a variável 'resultado' cuspiu
                chat.innerHTML += `<div class="ia-res">IA: ${data.resposta}</div>`;
            } catch (e) {
                chat.innerHTML += `<div style="color:red">Erro: Motor não respondeu.</div>`;
            }
            
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
